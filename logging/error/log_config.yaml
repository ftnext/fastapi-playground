version: 1
disable_existing_loggers: false
formatters:
  access:
    "()": uvicorn.logging.AccessFormatter
    fmt: '%(asctime)s - %(levelprefix)s %(client_addr)s - "%(request_line)s" %(status_code)s'
  json:
    "()": pythonjsonlogger.json.JsonFormatter
    fmt: '%(asctime)s %(name)s %(levelname)s %(message)s %(exc_info)s %(stack_info)s'
handlers:
  default:
    formatter: json
    class: logging.StreamHandler
    stream: ext://sys.stderr
  access:
    formatter: access
    class: logging.StreamHandler
    stream: ext://sys.stdout
loggers:
  uvicorn:
    handlers:
      - default
    level: INFO
    propagate: false
  uvicorn.error:
    level: INFO
  uvicorn.access:
    handlers:
      - access
    level: INFO
    propagate: false
